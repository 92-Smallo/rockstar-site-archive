<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🛒 Rockstar Store — new media</title>
<style>
body{background:#0d0d10;color:#e8e8ea;font-family:system-ui,Segoe UI,sans-serif;margin:0;padding:24px}
h1{font-size:18px;margin:0 0 4px}
.sub{color:#8a8a92;font-size:12px;margin-bottom:16px}
h2{font-size:12px;text-transform:uppercase;letter-spacing:2px;color:#fcaf17;margin:26px 0 10px}

.card img,.card video{width:100%;height:135px;object-fit:cover;background:#000}

.hint{color:#8a8a92;font-size:11px;margin:6px 0 0}
code{background:#000;padding:1px 5px;border-radius:4px}

</style></head><body>
<h1>🛒 Rockstar Store — 1 new media assets</h1>
<div class="sub">Rockstar Site Watch • generated 2026-07-09T11:44:04.244Z</div>
<div class="bar">
  <button onclick="cpy(this)">📋 Copy all URLs</button>
  <button onclick="dl('download-rockstar-media.sh',SH)">⬇ Download all (.sh)</button>
  <button onclick="dl('download-rockstar-media.ps1',PS)">⬇ Download all (.ps1)</button>
</div>
<div class="hint">The script fetches every file into <code>./rockstar-media</code>. <code>.sh</code> = Linux/macOS/Git-Bash/WSL (<code>bash download-rockstar-media.sh</code>) · <code>.ps1</code> = Windows PowerShell.</div>
<textarea id="all" readonly>https://store.rockstargames.com/maxresdefault.webp</textarea>

<h2>🖼️ Images (1)</h2><div class="grid"><a class="card" href="https://store.rockstargames.com/maxresdefault.webp" target="_blank" rel="noopener"><img loading="lazy" src="https://store.rockstargames.com/maxresdefault.webp"><span>maxresdefault.webp</span></a></div>
<script>
var SH="#!/usr/bin/env bash\n# Rockstar Site Watch — downloads every asset in this gallery into ./rockstar-media\nset -e\nmkdir -p rockstar-media && cd rockstar-media\nurls=(\n  \"https://store.rockstargames.com/maxresdefault.webp\"\n)\necho \"Downloading ${#urls[@]} files...\"\nfor u in \"${urls[@]}\"; do curl -fL -O \"$u\" && echo \"  ok  $u\" || echo \"  FAIL $u\"; done\necho \"Done -> $(pwd)\"",PS="# Rockstar Site Watch — downloads every asset in this gallery into .\\rockstar-media\n$dir = \"rockstar-media\"; New-Item -ItemType Directory -Force -Path $dir | Out-Null\n$urls = @(\n  \"https://store.rockstargames.com/maxresdefault.webp\"\n)\nWrite-Host \"Downloading $($urls.Count) files...\"\nforeach ($u in $urls) {\n  $n = Split-Path $u -Leaf\n  try { Invoke-WebRequest -Uri $u -OutFile (Join-Path $dir $n); Write-Host \"  ok  $u\" }\n  catch { Write-Host \"  FAIL $u\" }\n}\nWrite-Host \"Done -> $dir\"";
function dl(n,t){var b=new Blob([t],{type:'text/plain'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=n;document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},150);}
function cpy(el){navigator.clipboard.writeText(document.getElementById('all').value).then(function(){el.textContent='✓ Copied!';});}
</script>
</body></html>
